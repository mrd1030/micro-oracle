<script>
// Expanded action library (20+ actions)
let actions = [
  // ... previous 12 + new ones ...
  { id: 13, title: "Progressive muscle release", description: "Tense and release major muscle groups from feet to shoulders.", benefit: "Physical tension release", duration: "3-4 min", mood: ["stressed", "low"], category: "Physical", minTime: 3, maxTime: 7 },
  { id: 14, title: "Future self note", description: "Write one sentence to your future self about how you want to feel at the end of today.", benefit: "Increases intentionality", duration: "2 min", mood: ["energized"], category: "Mental", minTime: 2, maxTime: 5 },
  { id: 15, title: "Random act of kindness", description: "Do something small and kind for someone else (compliment, hold door, help with something small).", benefit: "Feel-good boost", duration: "2-5 min", mood: ["neutral", "energized", "bored"], category: "Social", minTime: 2, maxTime: 7 }
];

// Full modals including Chart.js in Insights
function showInsights() {
  const modal = document.createElement('div');
  modal.className = 'fixed inset-0 bg-black/60 z-[100] flex items-end sm:items-center justify-center';
  modal.innerHTML = `
    <div class="bg-white dark:bg-slate-800 w-full sm:w-[520px] rounded-t-3xl sm:rounded-3xl p-6 sm:m-4 max-h-[85vh] overflow-auto">
      <div class="flex justify-between mb-4">
        <h3 class="font-display text-2xl font-semibold dark:text-white">Your Insights</h3>
        <button onclick="this.closest('.fixed').remove()" class="text-3xl">&times;</button>
      </div>
      <canvas id="insights-chart" width="400" height="200" class="mb-6"></canvas>
      <div id="insights-text"></div>
    </div>`;
  document.body.appendChild(modal);

  const history = JSON.parse(localStorage.getItem('microOracleHistory') || '[]');
  const textDiv = modal.querySelector('#insights-text');
  textDiv.innerHTML = `<div class="text-sm mb-4">Total wins logged: <strong>${history.length}</strong></div>`;

  // Chart.js implementation
  const ctx = modal.querySelector('#insights-chart').getContext('2d');
  const categoryCounts = {};
  history.forEach(h => {
    const cat = h.category || 'Other';
    categoryCounts[cat] = (categoryCounts[cat] || 0) + 1;
  });

  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: Object.keys(categoryCounts),
      datasets: [{
        data: Object.values(categoryCounts),
        backgroundColor: ['#14b8a6', '#f59e0b', '#8b5cf6', '#ef4444', '#3b82f6']
      }]
    },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
  });
}

// Rest of the full implementation (modals, functions, initializeApp, etc.)

  console.log('%c[Micro Oracle] Premium version with charts and expanded features loaded.', 'color:#64748b');
}

window.onload = initializeApp;
</script>
