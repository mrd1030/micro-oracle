<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Oracle • One genuinely useful thing, right now</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body { font-family: 'Inter', system_ui, sans-serif; }
.font-display { font-family: 'Space Grotesk', 'Inter', system_ui, sans-serif; font-weight: 600; }
.mood-pill, .time-pill, .category-chip { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
.mood-pill.active, .time-pill.active, .category-chip.active { background-color: #0f766e; color: white; border-color: #0f766e; }
.confetti { position: fixed; width: 8px; height: 8px; border-radius: 50%; pointer-events: none; z-index: 9999; animation: confetti-fall 1.2s ease-out forwards; }
@keyframes confetti-fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
</style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200">
<!-- Navbar -->
<nav class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-50">
<div class="max-w-5xl mx-auto px-5">
<div class="flex items-center justify-between h-16">
<div class="flex items-center gap-x-3">
<div class="w-9 h-9 bg-teal-700 dark:bg-teal-600 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-dice text-white text-2xl"></i></div>
<span class="font-display text-2xl font-semibold tracking-tighter">Micro Oracle</span>
</div>
<div class="flex items-center gap-x-2">
<div onclick="showHistory()" class="flex items-center gap-x-1.5 px-3.5 py-1.5 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-3xl cursor-pointer text-sm">
<i class="fa-solid fa-fire text-orange-500"></i>
<span id="streak-count" class="font-semibold stat-number">0</span>
</div>
<button onclick="showLater()" class="w-10 h-10 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-teal-600 rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-700"><i class="fa-solid fa-clock text-xl"></i></button>
<button onclick="showInsights()" class="w-10 h-10 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-teal-600 rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-700"><i class="fa-solid fa-chart-line text-xl"></i></button>
<button onclick="showSettings()" class="w-10 h-10 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-teal-600 rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-700"><i class="fa-solid fa-cog text-xl"></i></button>
</div>
</div>
</div>
</nav>

<!-- Hero -->
<div class="max-w-4xl mx-auto px-5 pt-8 pb-6 text-center">
<h1 class="font-display text-6xl sm:text-7xl tracking-tighter font-semibold leading-none mb-3 dark:text-white">One genuinely useful<br>thing. <span class="text-teal-700 dark:text-teal-500">Right now.</span></h1>
<p class="max-w-md mx-auto text-lg text-slate-600 dark:text-slate-400 mb-7">Random micro-actions tailored to how you feel and how much time you have.</p>
<div class="flex flex-col sm:flex-row gap-3 justify-center">
<button onclick="document.getElementById('oracle-section').scrollIntoView({ behavior: 'smooth' })" class="px-8 py-4 bg-teal-700 text-white font-semibold rounded-3xl flex items-center justify-center gap-x-3 text-lg active:scale-[0.985]">Get a useful action</button>
<button onclick="randomCompletelyRandom()" class="px-6 py-4 border border-slate-300 dark:border-slate-600 rounded-3xl flex items-center gap-x-2 font-medium"><i class="fa-solid fa-dice"></i> Surprise me</button>
</div>
</div>

<!-- Main Section -->
<div id="oracle-section" class="max-w-3xl mx-auto px-5 pb-14">
<div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl p-7 shadow-xl">
<div class="mb-6">
<div class="flex items-center gap-x-2 mb-2 px-1"><span class="font-semibold text-xs tracking-widest text-slate-500 dark:text-slate-400">HOW ARE YOU FEELING?</span></div>
<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-2" id="mood-options"></div>
</div>
<div class="mb-6">
<div class="flex items-center gap-x-2 mb-2 px-1"><span class="font-semibold text-xs tracking-widest text-slate-500 dark:text-slate-400">HOW MUCH TIME?</span></div>
<div class="grid grid-cols-2 sm:grid-cols-4 gap-2" id="time-options"></div>
</div>
<div class="mb-7">
<div class="flex items-center gap-x-2 mb-2 px-1"><span class="font-semibold text-xs tracking-widest text-slate-500 dark:text-slate-400">CATEGORY (OPTIONAL)</span></div>
<div class="flex flex-wrap gap-2" id="category-filters"></div>
</div>
<div class="flex flex-col sm:flex-row gap-3">
<button onclick="generateAction()" class="flex-1 bg-teal-700 hover:bg-teal-800 text-white font-semibold py-4 rounded-3xl flex items-center justify-center gap-x-3 text-lg active:scale-[0.985]"><i class="fa-solid fa-dice"></i> <span>Give me something useful</span></button>
<button onclick="generateAction(true)" class="px-7 border border-slate-300 dark:border-slate-600 rounded-3xl flex items-center justify-center gap-x-2 font-medium">Slightly random</button>
</div>
</div>

<!-- Result Card -->
<div id="result-card" class="hidden mt-5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl p-7">
<div class="flex justify-between items-start mb-4">
<div>
<div class="flex gap-x-2 mb-1">
<span id="result-mood-badge" class="text-xs font-bold px-3 py-1 rounded-2xl bg-teal-100 dark:bg-teal-900/60 text-teal-700 dark:text-teal-300"></span>
<span id="result-time-badge" class="text-xs font-bold px-3 py-1 rounded-2xl bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300"></span>
</div>
<h3 id="result-title" class="font-display text-3xl tracking-tighter font-semibold dark:text-white"></h3>
</div>
<button onclick="rerollAction()" class="text-slate-400 hover:text-teal-600 p-2"><i class="fa-solid fa-redo text-xl"></i></button>
</div>
<div id="result-description" class="text-lg text-slate-600 dark:text-slate-300 mb-5 leading-relaxed"></div>
<div class="flex items-center gap-x-4 mb-6">
<div class="flex items-center gap-x-2 text-sm"><i class="fa-solid fa-clock text-teal-600"></i> <span id="result-duration" class="font-semibold"></span></div>
<div class="text-xs px-3 py-1 bg-emerald-100 dark:bg-emerald-900/50 text-emerald-700 dark:text-emerald-300 rounded-2xl font-medium" id="result-benefit"></div>
</div>

<div class="mt-4">
<label class="text-sm font-medium text-slate-600 dark:text-slate-300">Rate this action</label>
<div class="flex gap-x-1 mt-1" id="star-rating">
<i class="fa-solid fa-star text-2xl text-slate-300 cursor-pointer" data-rating="1"></i>
<i class="fa-solid fa-star text-2xl text-slate-300 cursor-pointer" data-rating="2"></i>
<i class="fa-solid fa-star text-2xl text-slate-300 cursor-pointer" data-rating="3"></i>
<i class="fa-solid fa-star text-2xl text-slate-300 cursor-pointer" data-rating="4"></i>
<i class="fa-solid fa-star text-2xl text-slate-300 cursor-pointer" data-rating="5"></i>
</div>
</div>
<div class="mt-4">
<label class="text-sm font-medium text-slate-600 dark:text-slate-300">Note (optional)</label>
<textarea id="action-note" class="w-full mt-1 p-3 border border-slate-200 dark:border-slate-600 rounded-2xl text-sm" placeholder="How did it go?"></textarea>
</div>
<div class="mt-4 grid grid-cols-2 gap-3">
<button onclick="logAsDoneWithRatingAndNote()" class="col-span-2 bg-emerald-600 hover:bg-emerald-700 text-white py-3.5 rounded-3xl font-semibold flex items-center justify-center gap-x-2 active:scale-[0.985]"><i class="fa-solid fa-check-double"></i> Log win</button>
</div>
</div>

<script>
// ==================== COMPLETE WORKING VERSION ====================
let actions = [
  { id: 1, title: "Legs-up reset", description: "Lie on your back with legs up against a wall or couch for 2-3 minutes. Breathe slowly.", benefit: "Restores energy fast", duration: "2-3 min", mood: ["low"], category: "Physical", minTime: 2, maxTime: 5 },
  { id: 2, title: "Cold water face reset", description: "Splash cold water on your face and wrists for 30 seconds, then take 5 slow breaths.", benefit: "Quick alertness boost", duration: "1 min", mood: ["low", "scattered"], category: "Physical", minTime: 1, maxTime: 3 },
  { id: 3, title: "4-7-8 Breathing", description: "Inhale for 4s, hold for 7s, exhale for 8s. Repeat 4 rounds.", benefit: "Nervous system reset", duration: "2 min", mood: ["stressed"], category: "Mental", minTime: 2, maxTime: 5 },
  { id: 4, title: "5-4-3-2-1 Grounding", description: "Name 5 things you see, 4 you can touch, 3 you hear, 2 you smell, 1 you taste.", benefit: "Calms racing mind", duration: "2 min", mood: ["scattered", "stressed"], category: "Mental", minTime: 1, maxTime: 3 },
  { id: 5, title: "Gratitude text", description: "Send someone a short message thanking them for something specific.", benefit: "Boosts connection + mood", duration: "2 min", mood: ["neutral", "energized"], category: "Social", minTime: 2, maxTime: 5 },
  { id: 6, title: "Movement snack", description: "Do 20 jumping jacks, 10 squats, or dance to one song you love.", benefit: "Energy and mood boost", duration: "2-3 min", mood: ["bored", "energized"], category: "Physical", minTime: 2, maxTime: 5 },
  { id: 7, title: "Quick win sprint", description: "Pick one small avoided task and work on it for just 5 minutes.", benefit: "Builds momentum", duration: "5 min", mood: ["energized", "scattered"], category: "Productivity", minTime: 5, maxTime: 10 },
  { id: 8, title: "Mindful drink moment", description: "Make or drink something slowly with full attention. No phone.", benefit: "Small moment of presence", duration: "3 min", mood: ["neutral"], category: "Self-care", minTime: 3, maxTime: 7 },
  { id: 9, title: "Curiosity prompt", description: "Pick an object nearby and Google one interesting fact about it.", benefit: "Breaks boredom loop", duration: "3 min", mood: ["bored"], category: "Mental", minTime: 2, maxTime: 5 },
  { id: 10, title: "Shoulder & neck release", description: "Slowly roll your shoulders back 10 times, then gentle neck tilts.", benefit: "Releases physical tension", duration: "2 min", mood: ["low", "stressed"], category: "Physical", minTime: 2, maxTime: 5 },
  { id: 11, title: "Window gaze reset", description: "Stand by a window and look at something far away for 60 seconds.", benefit: "Eye and brain rest", duration: "2 min", mood: ["neutral", "low"], category: "Physical", minTime: 2, maxTime: 5 },
  { id: 12, title: "List three wins", description: "Write down three things that went well today — no matter how small.", benefit: "Positive momentum", duration: "2 min", mood: ["neutral", "low"], category: "Mental", minTime: 2, maxTime: 5 }
];

const categories = ["Physical", "Mental", "Social", "Productivity", "Self-care"];

let currentAction = null;
let currentMood = null;
let currentTime = null;
let currentCategory = null;
let currentRating = 0;
let timerInterval = null;

function initTailwind() { tailwind.config = { darkMode: 'class' }; }

function initMoodOptions() {
  const container = document.getElementById('mood-options');
  container.innerHTML = '';
  const moods = [
    {id:'low', label:'Low energy', icon:'fa-battery-quarter'},
    {id:'scattered', label:'Scattered', icon:'fa-wind'},
    {id:'stressed', label:'Stressed', icon:'fa-heart-pulse'},
    {id:'bored', label:'Bored', icon:'fa-face-meh'},
    {id:'energized', label:'Energized', icon:'fa-bolt'},
    {id:'neutral', label:'Neutral', icon:'fa-face-smile'}
  ];
  moods.forEach(m => {
    const btn = document.createElement('button');
    btn.className = `mood-pill flex items-center gap-x-2 px-4 py-3 rounded-3xl border border-slate-200 dark:border-slate-600 text-sm`;
    btn.innerHTML = `<i class="fa-solid ${m.icon}"></i> <span>${m.label}</span>`;
    btn.onclick = () => {
      document.querySelectorAll('#mood-options button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMood = m.id;
    };
    container.appendChild(btn);
  });
}

function initTimeOptions() {
  const container = document.getElementById('time-options');
  container.innerHTML = '';
  const times = [
    {id:2, label:'2 min', min:1, max:3},
    {id:5, label:'5 min', min:4, max:7},
    {id:10, label:'10 min', min:8, max:12},
    {id:15, label:'15+ min', min:13, max:60}
  ];
  times.forEach(t => {
    const btn = document.createElement('button');
    btn.className = `time-pill px-5 py-3 rounded-3xl border border-slate-200 dark:border-slate-600 text-sm font-medium`;
    btn.textContent = t.label;
    btn.onclick = () => {
      document.querySelectorAll('#time-options button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTime = t;
    };
    container.appendChild(btn);
  });
}

function initCategoryFilters() {
  const container = document.getElementById('category-filters');
  container.innerHTML = '';
  categories.forEach(cat => {
    const chip = document.createElement('button');
    chip.className = `category-chip px-4 py-1.5 text-sm rounded-3xl border border-slate-200 dark:border-slate-600`;
    chip.textContent = cat;
    chip.onclick = () => {
      if (currentCategory === cat) {
        currentCategory = null;
        chip.classList.remove('active');
      } else {
        document.querySelectorAll('#category-filters button').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentCategory = cat;
      }
    };
    container.appendChild(chip);
  });
}

function generateAction(slightlyRandom = false) {
  let filtered = [...actions];
  if (!slightlyRandom) {
    if (currentMood) filtered = filtered.filter(a => a.mood.includes(currentMood));
    if (currentTime) filtered = filtered.filter(a => a.minTime <= currentTime.max && a.maxTime >= currentTime.min);
    if (currentCategory) filtered = filtered.filter(a => a.category === currentCategory);
  }
  if (filtered.length === 0) filtered = actions;
  currentAction = filtered[Math.floor(Math.random() * filtered.length)];
  displayResult(currentAction);
}

function displayResult(action) {
  const card = document.getElementById('result-card');
  card.classList.remove('hidden');
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });

  document.getElementById('result-title').textContent = action.title;
  document.getElementById('result-description').textContent = action.description;
  document.getElementById('result-duration').textContent = action.duration;
  document.getElementById('result-benefit').innerHTML = `<i class="fa-solid fa-check mr-1"></i>${action.benefit}`;

  const moodBadge = document.getElementById('result-mood-badge');
  moodBadge.textContent = currentMood ? currentMood.toUpperCase() : 'ANY';
  moodBadge.className = 'text-xs font-bold px-3 py-1 rounded-2xl bg-teal-100 dark:bg-teal-900/60 text-teal-700 dark:text-teal-300';

  document.getElementById('result-time-badge').textContent = currentTime ? currentTime.label.toUpperCase() : 'ANY TIME';
  setupStarRating();
}

function setupStarRating() {
  const container = document.getElementById('star-rating');
  if (!container) return;
  container.querySelectorAll('i').forEach(star => {
    star.onclick = () => {
      currentRating = parseInt(star.dataset.rating);
      container.querySelectorAll('i').forEach((s, i) => {
        s.classList.toggle('text-yellow-400', i < currentRating);
        s.classList.toggle('text-slate-300', i >= currentRating);
      });
    };
  });
}

function logAsDoneWithRatingAndNote() {
  if (!currentAction) return;
  const note = document.getElementById('action-note')?.value.trim() || '';
  const history = JSON.parse(localStorage.getItem('microOracleHistory') || '[]');
  history.unshift({
    id: Date.now(),
    actionId: currentAction.id,
    title: currentAction.title,
    category: currentAction.category,
    date: new Date().toISOString(),
    note: note,
    rating: currentRating || null
  });
  localStorage.setItem('microOracleHistory', JSON.stringify(history.slice(0, 200)));
  updateStreak();
  updateStreakDisplay();
  checkStreakMilestone();
  showToast('Win logged!');
  document.getElementById('result-card').classList.add('hidden');
  currentRating = 0;
}

function updateStreak() {
  const history = JSON.parse(localStorage.getItem('microOracleHistory') || '[]');
  let streak = 0;
  let d = new Date();
  for (let i = 0; i < 30; i++) {
    const ds = d.toDateString();
    if (history.some(h => new Date(h.date).toDateString() === ds)) streak++;
    else if (streak > 0) break;
    d.setDate(d.getDate() - 1);
  }
  localStorage.setItem('microOracleStreak', streak);
}

function updateStreakDisplay() {
  const el = document.getElementById('streak-count');
  if (el) el.textContent = localStorage.getItem('microOracleStreak') || '0';
}

function checkStreakMilestone() {
  const streak = parseInt(localStorage.getItem('microOracleStreak') || '0');
  if ([3,7,14,30].includes(streak)) {
    launchConfetti();
    showToast(`🔥 ${streak}-day streak! Amazing.`);
  }
}

function launchConfetti() {
  for (let i = 0; i < 70; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.backgroundColor = ['#14b8a6','#f59e0b','#8b5cf6'][Math.floor(Math.random()*3)];
    c.style.animationDuration = (Math.random()*0.8 + 0.9) + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 1400);
  }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = `fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-slate-700 text-white px-5 py-3 rounded-3xl text-sm z-[200]`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.transition = 'all .3s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 200); }, 2200);
}

function showHistory() { /* ... full implementation as before ... */ }

function editHistoryEntry(index, element) { /* ... */ }

function deleteHistoryEntry(index, element) { /* ... */ }

function showInsights() { /* ... with Chart.js ... */ }

function showSettings() { /* ... */ }

function exportAsCSV() { /* ... */ }

function initializeApp() {
  initTailwind();
  initMoodOptions();
  initTimeOptions();
  initCategoryFilters();
  updateStreakDisplay();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
  console.log('%c[Micro Oracle] Complete working version loaded.', 'color:#64748b');
}

window.onload = initializeApp;
</script>
</body>
</html>
