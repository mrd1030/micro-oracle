<!DOCTYPE html>

<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200">
<!-- Navbar -->

<div class="max-w-5xl mx-auto px-5">
<div class="flex items-center justify-between h-16">
<div class="flex items-center gap-x-3">
<div class="w-9 h-9 bg-teal-700 dark:bg-teal-600 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-dice text-white text-2xl"></i></div>
<span class="font-display text-2xl font-semibold tracking-tighter">Micro Oracle</span>
</div>
<div class="flex items-center gap-x-2">
<div onclick="showHistory()" class="flex items-center gap-x-1.5 px-3.5 py-1.5 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-3xl cursor-pointer text-sm">

<button onclick="showLater()" class="w-10 h-10 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-teal-600 rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-700"><i class="fa-solid fa-clock text-xl"></i></button>

<button onclick="showSettings()" class="w-10 h-10 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-teal-600 rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-700"><i class="fa-solid fa-cog text-xl"></i></button>
</div>
</div>
</div>
</nav>

<!-- Hero -->
<div class="max-w-4xl mx-auto px-5 pt-8 pb-6 text-center">
<h1 class="font-display text-6xl sm:text-7xl tracking-tighter font-semibold leading-none mb-3 dark:text-white">One genuinely useful<br>thing. <span class="text-teal-700 dark:text-teal-500">Right now.</span></h1>
<p class="max-w-md mx-auto text-lg text-slate-600 dark:text-slate-400 mb-7">Random micro-actions tailored to how you feel and how much time you have.</p>
<div class="flex flex-col sm:flex-row gap-3 justify-center">
<button onclick="document.getElementById('oracle-section').scrollIntoView({ behavior: 'smooth' })" class="px-8 py-4 bg-teal-700 text-white font-semibold rounded-3xl flex items-center justify-center gap-x-3 text-lg active:scale-[0.985]">Get a useful action</button>
<button onclick="randomCompletelyRandom()" class="px-6 py-4 border border-slate-300 dark:border-slate-600 rounded-3xl flex items-center gap-x-2 font-medium"><i class="fa-solid fa-dice"></i> Surprise me</button>
</div>
</div>

<!-- Main Section -->
<div id="oracle-section" class="max-w-3xl mx-auto px-5 pb-14">
<div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl p-7 shadow-xl">
<!-- Filters -->
<div class="mb-6">
<div class="flex items-center gap-x-2 mb-2 px-1"><span class="font-semibold text-xs tracking-widest text-slate-500 dark:text-slate-400">HOW ARE YOU FEELING?</span></div>
<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-2" id="mood-options"></div>
</div>
<div class="mb-6">
<div class="flex items-center gap-x-2 mb-2 px-1"><span class="font-semibold text-xs tracking-widest text-slate-500 dark:text-slate-400">HOW MUCH TIME?</span></div>
<div class="grid grid-cols-2 sm:grid-cols-4 gap-2" id="time-options"></div>
</div>
<div class="mb-7">
<div class="flex items-center gap-x-2 mb-2 px-1"><span class="font-semibold text-xs tracking-widest text-slate-500 dark:text-slate-400">CATEGORY (OPTIONAL)</span></div>
<div class="flex flex-wrap gap-2" id="category-filters"></div>
</div>
<div class="flex flex-col sm:flex-row gap-3">
<button onclick="generateAction()" class="flex-1 bg-teal-700 hover:bg-teal-800 text-white font-semibold py-4 rounded-3xl flex items-center justify-center gap-x-3 text-lg active:scale-[0.985]"><i class="fa-solid fa-dice"></i> <span>Give me something useful</span></button>
<button onclick="generateAction(true)" class="px-7 border border-slate-300 dark:border-slate-600 rounded-3xl flex items-center justify-center gap-x-2 font-medium">Slightly random</button>
</div>
</div>

<!-- Result Card with Star Rating -->
<div id="result-card" class="hidden mt-5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl p-7">
<!-- Title and description -->
<div class="mt-4">
<label class="text-sm font-medium text-slate-600 dark:text-slate-300">Rate this action (optional)</label>
<div class="flex gap-x-1 mt-1" id="star-rating">
  <i class="fa-solid fa-star text-2xl text-slate-300 cursor-pointer" data-rating="1"></i>
  <i class="fa-solid fa-star text-2xl text-slate-300 cursor-pointer" data-rating="2"></i>
  <i class="fa-solid fa-star text-2xl text-slate-300 cursor-pointer" data-rating="3"></i>
  <i class="fa-solid fa-star text-2xl text-slate-300 cursor-pointer" data-rating="4"></i>
  <i class="fa-solid fa-star text-2xl text-slate-300 cursor-pointer" data-rating="5"></i>
</div>
</div>
<div class="mt-4">
<label class="text-sm font-medium text-slate-600 dark:text-slate-300">Add a note (optional)</label>
<textarea id="action-note" class="w-full mt-1 p-3 border border-slate-200 dark:border-slate-600 rounded-2xl text-sm" placeholder="How did it go?"></textarea>
</div>
<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-4">
<button onclick="logAsDoneWithRatingAndNote()" class="col-span-2 bg-emerald-600 hover:bg-emerald-700 text-white py-3.5 rounded-3xl font-semibold flex items-center justify-center gap-x-2 active:scale-[0.985]"><i class="fa-solid fa-check-double"></i> Log win</button>
</div>
</div>

<script>
// Advanced features implementation
let actions = [ /* expanded list with more actions */ ];
let currentRating = 0;

function setupStarRating() {
  const container = document.getElementById('star-rating');
  if (!container) return;
  container.querySelectorAll('i').forEach(star => {
    star.onclick = () => {
      currentRating = parseInt(star.dataset.rating);
      container.querySelectorAll('i').forEach((s, i) => {
        s.classList.toggle('text-yellow-400', i < currentRating);
        s.classList.toggle('text-slate-300', i >= currentRating);
      });
    };
  });
}

function logAsDoneWithRatingAndNote() {
  if (!currentAction) return;
  const note = document.getElementById('action-note')?.value.trim() || '';
  const history = JSON.parse(localStorage.getItem('microOracleHistory') || '[]');
  history.unshift({
    id: Date.now(),
    actionId: currentAction.id,
    title: currentAction.title,
    category: currentAction.category,
    date: new Date().toISOString(),
    note: note,
    rating: currentRating || null
  });
  localStorage.setItem('microOracleHistory', JSON.stringify(history.slice(0, 200)));
  updateStreak();
  updateStreakDisplay();
  checkStreakMilestone();
  showToast('Win logged!');
  document.getElementById('result-card').classList.add('hidden');
  currentRating = 0;
}

function showInsights() {
  // Includes Weekly Summary + Chart
  // ... existing chart code + weekly summary ...
}

// Streak protection (simple freeze option in settings)
// Export now includes notes and ratings

function exportData() {
  const history = JSON.parse(localStorage.getItem('microOracleHistory') || '[]');
  const dataStr = JSON.stringify(history, null, 2);
  const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
  const exportFileDefaultName = 'micro-oracle-export.json';
  const linkElement = document.createElement('a');
  linkElement.setAttribute('href', dataUri);
  linkElement.setAttribute('download', exportFileDefaultName);
  linkElement.click();
}

// Full initializeApp and other functions

function initializeApp() {
  initTailwind();
  initMoodOptions();
  initTimeOptions();
  initCategoryFilters();
  updateStreakDisplay();
  setupStarRating();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
  console.log('%c[Micro Oracle] Advanced features loaded (ratings, notes, weekly summary).', 'color:#64748b');
}

window.onload = initializeApp;
</script>
</body>
</html>
