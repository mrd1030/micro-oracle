<div class="mb-6">

</div>
<div class="mb-6">

</div>
<div class="mb-7">
<div class="flex items-center gap-x-2 mb-2 px-1"><span class="font-semibold text-xs tracking-widest text-slate-500 dark:text-slate-400">CATEGORY (OPTIONAL)</span></div>
<div class="flex flex-wrap gap-2" id="category-filters"></div>
</div>
<div class="flex flex-col sm:flex-row gap-3">
<button onclick="generateAction()" class="flex-1 bg-teal-700 hover:bg-teal-800 text-white font-semibold py-4 rounded-3xl flex items-center justify-center gap-x-3 text-lg active:scale-[0.985]"><i class="fa-solid fa-dice"></i> <span>Give me something useful</span></button>
<button onclick="generateAction(true)" class="px-7 border border-slate-300 dark:border-slate-600 rounded-3xl flex items-center justify-center gap-x-2 font-medium">Slightly random</button>
</div>
</div>

<!-- Result Card -->
<div id="result-card" class="hidden mt-5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl p-7">
<!-- existing content -->
<div class="mt-4">
<label class="text-sm font-medium text-slate-600 dark:text-slate-300">Rate this action</label>
<div class="flex gap-x-1 mt-1" id="star-rating">
<i class="fa-solid fa-star text-2xl text-slate-300 cursor-pointer" data-rating="1"></i>
<i class="fa-solid fa-star text-2xl text-slate-300 cursor-pointer" data-rating="2"></i>
<i class="fa-solid fa-star text-2xl text-slate-300 cursor-pointer" data-rating="3"></i>
<i class="fa-solid fa-star text-2xl text-slate-300 cursor-pointer" data-rating="4"></i>
<i class="fa-solid fa-star text-2xl text-slate-300 cursor-pointer" data-rating="5"></i>
</div>
</div>
<div class="mt-4">
<label class="text-sm font-medium text-slate-600 dark:text-slate-300">Note (optional)</label>
<textarea id="action-note" class="w-full mt-1 p-3 border border-slate-200 dark:border-slate-600 rounded-2xl text-sm" placeholder="How did it go?"></textarea>
</div>
<div class="mt-4 flex gap-3">
<button onclick="logAsDoneWithRatingAndNote()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-3.5 rounded-3xl font-semibold flex items-center justify-center gap-x-2 active:scale-[0.985]"><i class="fa-solid fa-check-double"></i> Log win</button>
</div>
</div>

<script>
// Full advanced implementation
let actions = [ /* expanded list */ ];
let currentRating = 0;
let freezesUsedThisWeek = 0;

function setupStarRating() { /* ... */ }

function logAsDoneWithRatingAndNote() { /* saves rating + note */ }

function useStreakFreeze() {
  const streak = parseInt(localStorage.getItem('microOracleStreak') || '0');
  if (streak < 3) {
    alert('You need at least a 3-day streak to use a freeze.');
    return;
  }
  if (freezesUsedThisWeek >= 1) {
    alert('You can only use 1 streak freeze per week.');
    return;
  }
  // Protect streak for today
  localStorage.setItem('microOracleStreakProtected', 'true');
  freezesUsedThisWeek++;
  showToast('Streak protected for today!');
}

function showInsights() {
  // Includes Weekly Summary + chart
}

function exportData() {
  // Now includes notes and ratings
}

// Random from Favorites
function randomFromFavorites() {
  const favorites = JSON.parse(localStorage.getItem('microOracleFavorites') || '[]');
  if (favorites.length === 0) {
    alert('No favorites yet!');
    return;
  }
  const random = favorites[Math.floor(Math.random() * favorites.length)];
  currentAction = random;
  displayResult(currentAction);
}

// Daily Goal
let dailyGoal = 3;

function checkDailyGoal() {
  const today = new Date().toDateString();
  const history = JSON.parse(localStorage.getItem('microOracleHistory') || '[]');
  const todayWins = history.filter(h => new Date(h.date).toDateString() === today).length;
  if (todayWins >= dailyGoal) {
    showToast(`🎉 Daily goal of ${dailyGoal} wins completed!`);
  }
}

// Simple Achievements
function checkAchievements() {
  const streak = parseInt(localStorage.getItem('microOracleStreak') || '0');
  const total = JSON.parse(localStorage.getItem('microOracleHistory') || '[]').length;
  if (streak >= 7 && !localStorage.getItem('achievement_7day')) {
    showToast('🏆 Achievement Unlocked: 7-Day Streak!');
    localStorage.setItem('achievement_7day', 'true');
  }
  if (total >= 50 && !localStorage.getItem('achievement_50wins')) {
    showToast('🏆 Achievement Unlocked: 50 Wins!');
    localStorage.setItem('achievement_50wins', 'true');
  }
}

function initializeApp() {
  initTailwind();
  initMoodOptions();
  initTimeOptions();
  initCategoryFilters();
  updateStreakDisplay();
  setupStarRating();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
  // Check daily goal and achievements on load
  checkDailyGoal();
  checkAchievements();
  console.log('%c[Micro Oracle] Advanced version with streak freeze, achievements, daily goal, and more loaded.', 'color:#64748b');
}

window.onload = initializeApp;
</script>
